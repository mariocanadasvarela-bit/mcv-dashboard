<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MCV Seguros | Dashboard Ejecutivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f4f6f9] text-gray-700 font-['Inter'] antialiased">

    <!-- Header -->
    <div class="border-b border-gray-200 bg-white sticky top-0 z-20 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex justify-between items-center flex-wrap gap-3">
            <div>
                <h1 class="text-xl sm:text-2xl font-semibold tracking-tight text-gray-800">MCV Seguros</h1>
                <p class="text-gray-500 text-xs mt-0.5">Dashboard Ejecutivo · Gestión de seguros recurrentes y eventos puntuales</p>
            </div>
            <div class="flex gap-2 sm:gap-3 items-center">
                <button id="refreshBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 transition px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl text-xs sm:text-sm flex items-center gap-2">
                    <i class="fas fa-sync-alt text-xs"></i> Actualizar
                </button>
                <div class="bg-gray-100 px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl text-xs text-gray-600 border border-gray-200">
                    <i class="far fa-calendar-alt mr-1"></i>
                    <span id="lastUpdate">--:--</span>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
        <!-- Pestañas principales -->
        <div class="flex gap-3 mb-6 border-b border-gray-200 pb-2">
            <button data-tab="recurrente" class="tab-btn active px-4 py-2 text-sm font-medium rounded-t-lg bg-white text-gray-800 border-b-2 border-blue-400">Seguros recurrentes</button>
            <button data-tab="evento" class="tab-btn px-4 py-2 text-sm font-medium rounded-t-lg bg-gray-50 text-gray-600 hover:text-gray-800">Eventos puntuales</button>
        </div>

        <!-- Selector de empresa y filtros rápidos -->
        <div id="empresaSelectorContainer" class="mb-6">
            <div class="flex flex-wrap items-center gap-4">
                <div class="inline-flex rounded-md shadow-sm" role="group">
                    <button type="button" data-empresa="GHM SRL" class="empresa-btn bg-gray-100 text-gray-700 px-4 py-2 text-sm font-medium rounded-l-lg border border-gray-300 hover:bg-gray-200">GHM SRL</button>
                    <button type="button" data-empresa="GHM Satelital SRL" class="empresa-btn bg-gray-100 text-gray-700 px-4 py-2 text-sm font-medium border-t border-b border-gray-300 hover:bg-gray-200">GHM Satelital SRL</button>
                    <button type="button" data-empresa="Ambas" class="empresa-btn bg-blue-100 text-blue-800 px-4 py-2 text-sm font-medium rounded-r-lg border border-blue-300">Ambas empresas</button>
                </div>
                <div id="filtrosRapidos" class="flex flex-wrap gap-2">
                    <!-- Botones de ramo se generarán dinámicamente -->
                </div>
            </div>
        </div>

        <!-- KPIs (solo 4) -->
        <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6 mb-8">
            <div class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm">
                <div class="text-gray-500 text-xs uppercase tracking-wider">Gasto mensual</div>
                <div class="text-2xl sm:text-3xl font-bold mt-1 text-gray-800" id="kpiGastoMensual">$0</div>
                <div class="text-xs text-gray-400 mt-1" id="kpiGastoDetalle"></div>
            </div>
            <div class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm">
                <div class="text-gray-500 text-xs uppercase tracking-wider">Suma asegurada</div>
                <div class="text-2xl sm:text-3xl font-bold mt-1 text-gray-800" id="kpiSumaAsegurada">$0</div>
            </div>
            <div class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm">
                <div class="text-gray-500 text-xs uppercase tracking-wider">Pólizas activas</div>
                <div class="text-2xl sm:text-3xl font-bold mt-1 text-gray-800" id="kpiPolizasActivas">0</div>
            </div>
            <div class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm">
                <div class="text-gray-500 text-xs uppercase tracking-wider">Aseguradoras</div>
                <div class="text-2xl sm:text-3xl font-bold mt-1 text-gray-800" id="kpiAseguradoras">0</div>
            </div>
        </div>

        <!-- Gráficos (barras horizontales) -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm">
                <h3 class="font-medium text-gray-700 mb-4 text-sm flex items-center"><i class="fas fa-chart-simple mr-2 text-blue-400"></i> Gasto mensual por aseguradora</h3>
                <canvas id="chartGastoAseguradora" height="200"></canvas>
            </div>
            <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm">
                <h3 class="font-medium text-gray-700 mb-4 text-sm flex items-center"><i class="fas fa-chart-simple mr-2 text-blue-400"></i> Gasto mensual por ramo</h3>
                <canvas id="chartGastoRamo" height="200"></canvas>
            </div>
        </div>

        <!-- Listado de pólizas como tarjetas -->
        <div class="mt-8">
            <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
                <div class="flex items-center gap-3">
                    <div class="w-1 h-6 bg-blue-400 rounded-full"></div>
                    <h2 class="text-lg font-semibold text-gray-800">Pólizas</h2>
                    <span id="polizasCount" class="text-xs bg-gray-100 px-2 py-1 rounded-full">0</span>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="searchPoliza" placeholder="Buscar por N° póliza, patente, tomador..." class="text-sm border border-gray-200 rounded-lg px-3 py-1.5 w-64">
                    <button id="exportCSVBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1.5 rounded-xl text-xs flex items-center gap-1"><i class="fas fa-download"></i> CSV</button>
                    <button id="exportExcelBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1.5 rounded-xl text-xs flex items-center gap-1"><i class="fas fa-file-excel"></i> Excel</button>
                    <button id="exportPDFBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1.5 rounded-xl text-xs flex items-center gap-1"><i class="fas fa-file-pdf"></i> PDF</button>
                </div>
            </div>
            <div id="polizasListContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Aquí se renderizan las tarjetas de póliza -->
            </div>
        </div>

        <div class="mt-12 text-center text-xs text-gray-400 border-t border-gray-200 pt-6">
            <p>Actualizado automáticamente desde Google Sheets · MCV Seguros</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
